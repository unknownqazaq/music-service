# fly.toml app configuration file generated for music-service on 2026-06-11T14:58:41Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'music-service'
primary_region = 'ams'

[build]
  dockerfile = 'Dockerfile'

[deploy]
  release_command = './migrate -path ./migrations -database $DATABASE_URL up'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[[vm]]
  size = 'shared-cpu-1x'
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 256
